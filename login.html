<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>כניסה — Libra מרכז ידע</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Segoe UI",Arial,sans-serif;background:#f8f9fa;display:flex;align-items:center;justify-content:center;min-height:100vh;direction:rtl}
.card{background:#fff;border-radius:1.25rem;padding:2.5rem 2.75rem;width:360px;max-width:92vw;box-shadow:0 8px 40px rgba(0,0,0,0.13);text-align:center}
.logo{display:flex;align-items:center;justify-content:center;gap:0.6rem;margin-bottom:1.5rem}
.logo img{height:52px;border-radius:6px}
.logo span{font-size:2rem;font-weight:800;color:#1c1c1c}
h2{font-size:1.15rem;font-weight:700;color:#1c1c1c;margin-bottom:0.3rem}
p{color:#888;font-size:0.85rem;margin-bottom:1.75rem}
label{display:block;text-align:right;font-size:0.82rem;font-weight:700;color:#555;margin-bottom:0.25rem}
input{width:100%;padding:0.65rem 1rem;border:2px solid #e5e7eb;border-radius:0.5rem;font-size:0.95rem;direction:rtl;outline:none;margin-bottom:1rem;display:block}
input:focus{border-color:#ffd703;box-shadow:0 0 0 3px rgba(255,215,3,0.2)}
button{width:100%;padding:0.75rem;background:#ffd703;color:#1c1c1c;font-weight:800;font-size:1rem;border:none;border-radius:0.5rem;cursor:pointer;transition:background .2s}
button:hover{background:#ffcb00}
#errMsg{color:#e53e3e;font-size:0.83rem;margin-top:0.75rem;min-height:1.1rem}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <img src="libra-logo.png" alt="Libra">
    <span>Libra</span>
  </div>
  <h2>מרכז הידע</h2>
  <p>הזן שם משתמש וסיסמה להמשך</p>
  <label>שם משתמש</label>
  <input type="text" id="u" placeholder="שם משתמש" autocomplete="username">
  <label>סיסמה</label>
  <input type="password" id="p" placeholder="סיסמה" autocomplete="current-password" onkeydown="if(event.key==='Enter')login()">
  <button onclick="login()">כניסה</button>
  <div id="errMsg"></div>
</div>
<script>
  var USERS = {
    'libra-admin': { password: 'libra2026', role: 'admin',  label: 'מנהל' },
    'libra':       { password: '1234',      role: 'viewer', label: 'צופה'  }
  };
  function login(){
    var u = document.getElementById('u').value.trim();
    var p = document.getElementById('p').value;
    var acct = USERS[u];
    if(acct && acct.password === p){
      sessionStorage.setItem('kbRole',  acct.role);
      sessionStorage.setItem('kbLabel', acct.label);
      window.location.href = 'kb_libra.html';
    } else {
      document.getElementById('errMsg').textContent = 'שם משתמש או סיסמה שגויים';
    }
  }
</script>
</body>
</html>
